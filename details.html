<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <style>body{margin:0;} #map{width:100vw;height:100vh;}</style>
</head>
<body>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    const p = new URLSearchParams(window.location.search);
    const myLat = parseFloat((p.get("mylat") || "").replace(",", "."));
    const myLon = parseFloat((p.get("mylon") || "").replace(",", "."));
    const ttLat = parseFloat((p.get("ttlat") || "").replace(",", "."));
    const ttLon = parseFloat((p.get("ttlon") || "").replace(",", "."));
    const ttName = p.get("name") || "ТТ";
    const map = L.map("map").setView([ttLat, ttLon], 17);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);
    // Пин "Я здесь"
    const myIcon = L.divIcon({
      html: '<div style="background:blue;color:white;padding:4px 8px;border-radius:12px;font-weight:bold;white-space:nowrap;">Я</div>',
      className: ''
    });
    L.marker([myLat, myLon], {icon: myIcon}).addTo(map).bindPopup("Я здесь");
    // Пин ТТ
    const ttIcon = L.divIcon({
      html: '<div style="background:red;color:white;padding:4px 8px;border-radius:12px;font-weight:bold;white-space:nowrap;">ТТ</div>',
      className: ''
    });
    L.marker([ttLat, ttLon], {icon: ttIcon}).addTo(map).bindPopup(ttName).openPopup();
    // Линия между точками
    L.polyline([[myLat, myLon], [ttLat, ttLon]], {color: "blue", dashArray: "6"}).addTo(map);
    // Вмещаем обе точки на экран
    map.fitBounds([[myLat, myLon], [ttLat, ttLon]], {padding: [50, 50]});
  </script>
</body>
</html>
